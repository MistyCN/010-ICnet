services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: infcraft-web:latest
    container_name: infcraft-web-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SERVER_IP=${NEXT_PUBLIC_SERVER_IP:-infcraft.mistycn.com}
      - NEXT_PUBLIC_SERVER_PORT=${NEXT_PUBLIC_SERVER_PORT:-25565}
      - MC_STATUS_TIMEOUT_MS=${MC_STATUS_TIMEOUT_MS:-12000}
      - MC_STATUS_CACHE_TTL_SECONDS=${MC_STATUS_CACHE_TTL_SECONDS:-30}
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/dev.db}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?set NEXTAUTH_URL in .env}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      - GLOBAL_ADMIN_PASSWORD=${GLOBAL_ADMIN_PASSWORD:?set GLOBAL_ADMIN_PASSWORD in .env}
